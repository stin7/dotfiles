# ── Nord palette ─────────────────────────────────────────────────────
# nord7 #8FBCBB·109  nord8 #88C0D0·110  nord9 #81A1C1·109  nord10 #5E81AC·67
# nord11 #BF616A·131  nord12 #D08770·173  nord13 #EBCB8B·222
# nord14 #A3BE8C·144  nord15 #B48EAD·139  nord3 #4C566A·240

# --- General ---
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 0

# --- Status bar ---
set -g status-style "bg=default,fg=colour240"
set -g status-left "#[fg=colour144]#S #[fg=colour240]│ "
set -g status-left-length 20
set -g status-right "#(c=\"109 110 144 139 173\"; h=$(hostname | cksum | awk '{print $1}'); set -- $c; shift $(( h % $# )); printf '\\#[fg=colour%s]' $1)#(whoami)@#H"
set -g status-right-length 30
set -g status-justify left

setw -g window-status-format "#[fg=colour240]#I:#W"
setw -g window-status-current-format "#[fg=colour110]#I:#W"

# --- Activity alerts ---
setw -g monitor-activity on
set -g visual-activity off
setw -g window-status-activity-style "fg=colour222,none"

# --- Pane borders ---
set -g pane-border-style "fg=colour240"
set -g pane-active-border-style "fg=colour110"

# --- Messages & command prompt ---
set -g message-style "bg=default,fg=colour222"
set -g message-command-style "bg=default,fg=colour222"

# --- Selection / copy mode ---
setw -g mode-style "bg=colour240,fg=colour110"
